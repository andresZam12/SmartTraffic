<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartTraffic — Dashboard</title>
  <style>
    :root {
      --bg:        #080c14;
      --surface:   #0d1526;
      --surface2:  #111d35;
      --border:    #1a3050;
      --green:     #00e676;
      --yellow:    #ffb300;
      --red:       #ff1744;
      --blue:      #2979ff;
      --text:      #e2e8f0;
      --muted:     #4a6080;
      --g-dim:     rgba(0,230,118,.12);
      --y-dim:     rgba(255,179,0,.12);
      --r-dim:     rgba(255,23,68,.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        linear-gradient(rgba(41,121,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(41,121,255,.025) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    /* ── Navbar ── */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: rgba(8,12,20,.92);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 38px; height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, #2979ff 0%, #00e5ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      flex-shrink: 0;
      box-shadow: 0 0 14px rgba(41,121,255,.4);
    }

    .logo-text h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }

    .logo-text span {
      font-size: 0.68rem;
      color: var(--muted);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .dot.verde { background: var(--green);  animation: pulse 1.4s infinite; }
    .dot.rojo  { background: var(--red); }
    .dot.live  { background: var(--yellow); animation: pulse .9s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    /* ── Main layout ── */
    .main {
      max-width: 1380px;
      margin: 0 auto;
      padding: 24px 24px 48px;
    }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 26px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color .3s, box-shadow .3s;
    }

    .stat-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    .stat-icon.total  { background: rgba(41,121,255,.15);  box-shadow: 0 0 12px rgba(41,121,255,.1); }
    .stat-icon.green  { background: rgba(0,230,118,.15);   box-shadow: 0 0 12px rgba(0,230,118,.1); }
    .stat-icon.yellow { background: rgba(255,179,0,.15);   box-shadow: 0 0 12px rgba(255,179,0,.1); }
    .stat-icon.red    { background: rgba(255,23,68,.15);   box-shadow: 0 0 12px rgba(255,23,68,.1); }

    .stat-val {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      line-height: 1;
      transition: color .4s;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ── Section header ── */
    .sec-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .sec-title {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.3px;
    }

    .sec-meta {
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ── Zone grid ── */
    .zonas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 14px;
      margin-bottom: 26px;
    }

    /* ── Zone card ── */
    .zona-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 18px 16px;
      position: relative;
      overflow: hidden;
      transition: transform .2s, box-shadow .4s, border-color .4s;
      cursor: default;
    }

    .zona-card:hover { transform: translateY(-3px); }

    /* Top accent stripe */
    .zona-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
    }

    .zona-card.DESPEJADA {
      border-color: rgba(0,230,118,.45);
      box-shadow: 0 4px 24px rgba(0,230,118,.07);
    }
    .zona-card.DESPEJADA::after    { background: linear-gradient(90deg, #00b248, #00e676); }

    .zona-card.MODERADA {
      border-color: rgba(255,179,0,.45);
      box-shadow: 0 4px 24px rgba(255,179,0,.07);
    }
    .zona-card.MODERADA::after     { background: linear-gradient(90deg, #ff8f00, #ffb300); }

    .zona-card.CONGESTIONADA {
      border-color: rgba(255,23,68,.45);
      box-shadow: 0 4px 24px rgba(255,23,68,.09);
    }
    .zona-card.CONGESTIONADA::after { background: linear-gradient(90deg, #b71c1c, #ff1744); }

    @keyframes card-flash {
      0%   { background: var(--surface2); }
      100% { background: var(--surface); }
    }
    .zona-card.flash { animation: card-flash .5s ease-out; }

    /* Card top row */
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .zona-nombre {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.1px;
    }

    .trend {
      font-size: 0.82rem;
      line-height: 1;
    }

    /* Status pill */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.73rem;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .status-pill.DESPEJADA    { background: var(--g-dim); color: var(--green); }
    .status-pill.MODERADA     { background: var(--y-dim); color: var(--yellow); }
    .status-pill.CONGESTIONADA { background: var(--r-dim); color: var(--red); }

    /* Gauge */
    .gauge-wrap {
      height: 7px;
      background: rgba(255,255,255,.05);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .gauge-fill {
      height: 100%;
      border-radius: 6px;
      transition: width .9s cubic-bezier(.4,0,.2,1);
    }
    .DESPEJADA    .gauge-fill { background: linear-gradient(90deg, #00b248, #00e676); }
    .MODERADA     .gauge-fill { background: linear-gradient(90deg, #ff8f00, #ffb300); }
    .CONGESTIONADA .gauge-fill { background: linear-gradient(90deg, #b71c1c, #ff1744); }

    /* Sparkline */
    .spark-wrap {
      height: 38px;
      margin: 10px 0 8px;
    }
    .spark-wrap svg { width: 100%; height: 100%; }

    /* Card footer */
    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-foot span {
      font-size: 0.68rem;
      color: var(--muted);
    }

    .card-foot strong { color: var(--text); }

    /* ── Feed panel ── */
    .feed-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
    }

    .feed-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
      max-height: 200px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .feed-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,.025);
      font-size: 0.71rem;
      animation: slide-in .25s ease-out;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .feed-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .feed-dot.DESPEJADA    { background: var(--green); }
    .feed-dot.MODERADA     { background: var(--yellow); }
    .feed-dot.CONGESTIONADA { background: var(--red); }

    .feed-time {
      color: var(--muted);
      font-size: 0.66rem;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* ── Waiting ── */
    #esperando {
      text-align: center;
      padding: 90px 20px;
      color: var(--muted);
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--surface2);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 540px) {
      .navbar { padding: 12px 16px; }
      .main   { padding: 14px 14px 40px; }
      .logo-text span { display: none; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">
    <div class="logo-icon">🚦</div>
    <div class="logo-text">
      <h1>SmartTraffic</h1>
      <span>Monitoreo Vehicular en Tiempo Real</span>
    </div>
  </div>
  <div class="nav-right">
    <div class="badge" id="badge-ws">
      <span class="dot" id="dot-ws"></span>
      <span id="txt-ws">Conectando...</span>
    </div>
    <div class="badge" id="badge-live" style="display:none">
      <span class="dot live"></span>EN VIVO
    </div>
  </div>
</nav>

<div class="main">

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-icon total">🌐</div>
      <div>
        <div class="stat-val" id="s-total">—</div>
        <div class="stat-label">Zonas activas</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">🟢</div>
      <div>
        <div class="stat-val" id="s-desp" style="color:var(--green)">—</div>
        <div class="stat-label">Despejadas</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon yellow">🟡</div>
      <div>
        <div class="stat-val" id="s-mod" style="color:var(--yellow)">—</div>
        <div class="stat-label">Moderadas</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon red">🔴</div>
      <div>
        <div class="stat-val" id="s-cong" style="color:var(--red)">—</div>
        <div class="stat-label">Congestionadas</div>
      </div>
    </div>
  </div>

  <div id="esperando">
    <div class="spinner"></div>
    <p>Conectando con el sistema de tráfico...</p>
  </div>

  <div id="content" style="display:none">

    <div class="sec-head">
      <span class="sec-title">Zonas monitoreadas</span>
      <span class="sec-meta" id="txt-update"></span>
    </div>
    <div class="zonas-grid" id="zonas-grid"></div>

    <div class="sec-head">
      <span class="sec-title">Actividad reciente</span>
    </div>
    <div class="feed-panel">
      <div class="feed-list" id="feed-list">
        <div style="text-align:center;color:var(--muted);font-size:.72rem;padding:12px">
          Sin eventos aún…
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  const WS_URL = "ws://localhost:8765";

  const dotWs   = document.getElementById("dot-ws");
  const txtWs   = document.getElementById("txt-ws");
  const badgeLive = document.getElementById("badge-live");
  const txtUpd  = document.getElementById("txt-update");
  const waiting = document.getElementById("esperando");
  const content = document.getElementById("content");
  const grid    = document.getElementById("zonas-grid");
  const feed    = document.getElementById("feed-list");

  const sTotal = document.getElementById("s-total");
  const sDesp  = document.getElementById("s-desp");
  const sMod   = document.getElementById("s-mod");
  const sCong  = document.getElementById("s-cong");

  const ICONS  = { DESPEJADA:"🟢", MODERADA:"🟡", CONGESTIONADA:"🔴" };
  const LABELS = { DESPEJADA:"Despejada", MODERADA:"Moderada", CONGESTIONADA:"Congestionada" };

  const historiales = {};   // zona → last 12 promedio values
  let updates = 0;

  // ── Sparkline SVG ──────────────────────────────────────────────
  function sparkline(vals, estado) {
    if (!vals || vals.length < 2) return "<svg></svg>";
    const W = 200, H = 38;
    const lo = Math.min(...vals), hi = Math.max(...vals);
    const rng = hi - lo || 1;
    const step = W / (vals.length - 1);
    const pts = vals.map((v, i) => `${i * step},${H - ((v - lo) / rng) * (H - 5) - 2}`);
    const color = { DESPEJADA:"#00e676", MODERADA:"#ffb300", CONGESTIONADA:"#ff1744" }[estado] || "#64748b";
    const area = `0,${H} ${pts.join(" ")} ${W},${H}`;
    const lastX = (vals.length - 1) * step;
    const lastY = H - ((vals[vals.length - 1] - lo) / rng) * (H - 5) - 2;
    return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="g${estado}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity=".22"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <polygon points="${area}" fill="url(#g${estado})"/>
      <polyline points="${pts.join(" ")}" fill="none" stroke="${color}"
                stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${lastX}" cy="${lastY}" r="3" fill="${color}"/>
    </svg>`;
  }

  // ── Trend arrow ────────────────────────────────────────────────
  function trend(vals) {
    if (!vals || vals.length < 2) return '<span style="color:var(--muted)">—</span>';
    const d = vals[vals.length - 1] - vals[vals.length - 2];
    if (d >  3) return '<span style="color:var(--red)">↑</span>';
    if (d < -3) return '<span style="color:var(--green)">↓</span>';
    return '<span style="color:var(--muted)">→</span>';
  }

  // ── Update summary stats ───────────────────────────────────────
  function updateStats(estado) {
    const vals = Object.values(estado).map(d => d.estado ?? d);
    sTotal.textContent = vals.length;
    sDesp.textContent  = vals.filter(e => e === "DESPEJADA").length;
    sMod.textContent   = vals.filter(e => e === "MODERADA").length;
    sCong.textContent  = vals.filter(e => e === "CONGESTIONADA").length;
  }

  // ── Push to activity feed ──────────────────────────────────────
  function pushFeed(zona, estado, prom) {
    const time = new Date().toLocaleTimeString("es-CO");
    const item = document.createElement("div");
    item.className = "feed-item";
    item.innerHTML = `
      <span class="feed-dot ${estado}"></span>
      <span><strong>${zona}</strong> cambió a ${LABELS[estado] ?? estado} · ${prom} veh</span>
      <span class="feed-time">${time}</span>`;
    const placeholder = feed.querySelector("div[style]");
    if (placeholder) placeholder.remove();
    feed.insertBefore(item, feed.firstChild);
    while (feed.children.length > 40) feed.lastChild.remove();
  }

  // ── Render / update zone card ──────────────────────────────────
  function actualizarGrid(estado) {
    waiting.style.display = "none";
    content.style.display = "block";
    badgeLive.style.display = "inline-flex";
    updates++;
    updateStats(estado);
    txtUpd.textContent = `Actualización #${updates} · ${new Date().toLocaleTimeString("es-CO")}`;

    for (const [zona, datos] of Object.entries(estado)) {
      const est  = datos.estado   ?? datos;
      const prom = datos.promedio ?? null;
      const pct  = prom !== null ? Math.min(100, Math.round(prom)) : 0;

      if (!historiales[zona]) historiales[zona] = [];
      if (prom !== null) {
        historiales[zona].push(prom);
        if (historiales[zona].length > 12) historiales[zona].shift();
      }

      const id = `z-${zona.replace(/\s+/g, "-")}`;
      let card = document.getElementById(id);
      const isNew = !card;

      if (isNew) {
        card = document.createElement("div");
        card.id = id;
        grid.appendChild(card);
      }

      const prevEst = card.dataset.estado;
      const changed = prevEst && prevEst !== est;
      card.dataset.estado = est;
      card.className = `zona-card ${est}`;

      card.innerHTML = `
        <div class="card-top">
          <span class="zona-nombre">${zona}</span>
          <span class="trend">${trend(historiales[zona])}</span>
        </div>
        <div class="status-pill ${est}">${ICONS[est] ?? "⚪"} ${LABELS[est] ?? est}</div>
        <div class="gauge-wrap"><div class="gauge-fill" style="width:${pct}%"></div></div>
        <div class="spark-wrap">${sparkline(historiales[zona], est)}</div>
        <div class="card-foot">
          <span>Promedio <strong>${prom ?? "—"}</strong> veh</span>
          <span>Carga <strong>${pct}%</strong></span>
        </div>`;

      if (isNew || changed) {
        void card.offsetWidth;
        card.classList.add("flash");
        card.addEventListener("animationend", () => card.classList.remove("flash"), { once: true });
        if (changed) pushFeed(zona, est, prom ?? 0);
      }
    }
  }

  // ── WebSocket ──────────────────────────────────────────────────
  function conectar() {
    const ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      dotWs.className   = "dot verde";
      txtWs.textContent = "Conectado";
    };

    ws.onmessage = ({ data }) => {
      try { actualizarGrid(JSON.parse(data)); }
      catch (e) { console.error("[WS]", e); }
    };

    ws.onclose = () => {
      dotWs.className     = "dot rojo";
      txtWs.textContent   = "Reconectando...";
      badgeLive.style.display = "none";
      setTimeout(conectar, 5000);
    };

    ws.onerror = () => {
      dotWs.className   = "dot rojo";
      txtWs.textContent = "Error de conexión";
    };
  }

  conectar();
</script>
</body>
</html>
