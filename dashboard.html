<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartTraffic — Tráfico en Tiempo Real</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 28px 24px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
    }

    header p {
      color: #64748b;
      margin-top: 6px;
      font-size: 0.88rem;
    }

    /* ── Barra de estado ── */
    #status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      background: #1e293b;
      border: 1px solid #334155;
    }

    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #475569;
      flex-shrink: 0;
    }
    .dot.verde    { background: #22c55e; animation: pulso 1.4s infinite; }
    .dot.rojo     { background: #ef4444; }
    .dot.live     { background: #f59e0b; animation: pulso 0.9s infinite; }

    @keyframes pulso {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.45; transform: scale(0.85); }
    }

    /* ── Grid de zonas ── */
    #zonas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Tarjeta ── */
    .zona-card {
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 14px;
      padding: 22px 20px;
      transition: border-color 0.5s, box-shadow 0.5s;
      position: relative;
      overflow: hidden;
    }

    .zona-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.6s;
      pointer-events: none;
    }

    /* Flash al actualizar */
    .zona-card.flash::before { opacity: 0.08; animation: flash-in 0.7s forwards; }
    @keyframes flash-in {
      0%   { opacity: 0.18; }
      100% { opacity: 0; }
    }

    /* Colores por estado */
    .zona-card.DESPEJADA {
      border-color: #22c55e;
      box-shadow: 0 0 18px rgba(34,197,94,0.18);
    }
    .zona-card.DESPEJADA::before { background: #22c55e; }

    .zona-card.MODERADA {
      border-color: #f59e0b;
      box-shadow: 0 0 18px rgba(245,158,11,0.18);
    }
    .zona-card.MODERADA::before { background: #f59e0b; }

    .zona-card.CONGESTIONADA {
      border-color: #ef4444;
      box-shadow: 0 0 22px rgba(239,68,68,0.22);
    }
    .zona-card.CONGESTIONADA::before { background: #ef4444; }

    /* Nombre de zona */
    .zona-nombre {
      font-size: 0.82rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }

    /* Estado con icono */
    .zona-estado {
      font-size: 1.25rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 14px;
    }
    .zona-estado.DESPEJADA    { color: #22c55e; }
    .zona-estado.MODERADA     { color: #f59e0b; }
    .zona-estado.CONGESTIONADA { color: #ef4444; }

    /* Barra de vehículos */
    .barra-wrap {
      height: 6px;
      background: #0f172a;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .barra-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.8s ease;
    }
    .DESPEJADA    .barra-fill { background: #22c55e; }
    .MODERADA     .barra-fill { background: #f59e0b; }
    .CONGESTIONADA .barra-fill { background: #ef4444; }

    .zona-promedio {
      font-size: 0.75rem;
      color: #475569;
    }
    .zona-promedio span {
      color: #94a3b8;
      font-weight: 600;
    }

    /* ── Mensaje de espera ── */
    #esperando {
      text-align: center;
      color: #475569;
      margin-top: 70px;
      font-size: 0.95rem;
    }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid #1e293b;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    #footer {
      text-align: center;
      color: #334155;
      font-size: 0.75rem;
      margin-top: 28px;
    }
  </style>
</head>
<body>

<header>
  <h1>🚦 SmartTraffic Dashboard</h1>
  <p>Sistema de Monitoreo de Tráfico Vehicular Inteligente</p>

  <div id="status-bar">
    <div class="badge" id="badge-ws">
      <span class="dot" id="dot-ws"></span>
      <span id="txt-ws">Conectando...</span>
    </div>
    <div class="badge" id="badge-live" style="display:none">
      <span class="dot live"></span>
      <span>EN VIVO</span>
    </div>
    <div class="badge" id="badge-update" style="display:none">
      <span id="txt-update">Actualizando cada 5s</span>
    </div>
  </div>
</header>

<div id="esperando">
  <div class="spinner"></div>
  <p>Esperando datos del sistema...</p>
</div>

<div id="zonas-grid" style="display:none"></div>

<p id="footer"></p>

<script>
  const WS_URL = "ws://localhost:8765";

  const grid        = document.getElementById("zonas-grid");
  const esperando   = document.getElementById("esperando");
  const dotWs       = document.getElementById("dot-ws");
  const txtWs       = document.getElementById("txt-ws");
  const badgeLive   = document.getElementById("badge-live");
  const badgeUpdate = document.getElementById("badge-update");
  const footer      = document.getElementById("footer");

  const ICONOS = { DESPEJADA: "🟢", MODERADA: "🟡", CONGESTIONADA: "🔴" };
  const LABELS = { DESPEJADA: "Despejada", MODERADA: "Moderada", CONGESTIONADA: "Congestionada" };

  let updateCount = 0;

  function actualizarGrid(estado) {
    esperando.style.display  = "none";
    grid.style.display       = "grid";
    badgeLive.style.display  = "inline-flex";
    badgeUpdate.style.display = "inline-flex";

    updateCount++;

    for (const [zona, datos] of Object.entries(estado)) {
      const estadoZona   = datos.estado   ?? datos;
      const promedioZona = datos.promedio ?? null;
      const pct          = promedioZona !== null ? Math.min(100, Math.round(promedioZona)) : 0;

      const id = `zona-${zona.replace(/\s+/g, "-")}`;
      let card = document.getElementById(id);

      const esNueva = !card;
      if (esNueva) {
        card = document.createElement("div");
        card.id = id;
        card.innerHTML = `
          <div class="zona-nombre">${zona}</div>
          <div class="zona-estado"></div>
          <div class="barra-wrap"><div class="barra-fill"></div></div>
          <div class="zona-promedio">Promedio: <span></span> vehículos</div>
        `;
        grid.appendChild(card);
      }

      const estadoAnterior = card.dataset.estado;

      // Actualizar contenido
      card.className = `zona-card ${estadoZona}`;
      card.dataset.estado = estadoZona;

      const elEstado = card.querySelector(".zona-estado");
      elEstado.className = `zona-estado ${estadoZona}`;
      elEstado.textContent = `${ICONOS[estadoZona] ?? "⚪"} ${LABELS[estadoZona] ?? estadoZona}`;

      card.querySelector(".barra-fill").style.width = `${pct}%`;

      if (promedioZona !== null) {
        card.querySelector(".zona-promedio span").textContent = promedioZona;
      }

      // Flash visual si el estado cambió (o es nueva tarjeta)
      if (estadoAnterior !== estadoZona) {
        card.classList.remove("flash");
        void card.offsetWidth; // reflow para reiniciar animación
        card.classList.add("flash");
      }
    }

    const hora = new Date().toLocaleTimeString("es-CO");
    footer.textContent = `Última actualización: ${hora}  ·  Total recibidos: ${updateCount}`;
  }

  function conectar() {
    const ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      dotWs.className   = "dot verde";
      txtWs.textContent = "Conectado al servidor";
    };

    ws.onmessage = ({ data }) => {
      try { actualizarGrid(JSON.parse(data)); }
      catch (e) { console.error("[WS] Error JSON:", e); }
    };

    ws.onclose = () => {
      dotWs.className      = "dot rojo";
      txtWs.textContent    = "Desconectado — reconectando en 5s...";
      badgeLive.style.display = "none";
      setTimeout(conectar, 5000);
    };

    ws.onerror = () => {
      dotWs.className   = "dot rojo";
      txtWs.textContent = "Error de conexión";
    };
  }

  conectar();
</script>
</body>
</html>
